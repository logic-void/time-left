<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>Time left</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <style type="text/css" media="all">
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background: linear-gradient(
                    135deg,
                    rgba(0, 0, 0, 0.6),
                    rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.6)
                );
            }
            h2 {
                font-size: 2rem;
                color: ivory;
                letter-spacing: 0.3rem;
                font-family: "EB Garamond", Sans-Serif;
            }
        </style>
    </head>
    <body>
        <h2 id="time"></h2>
        <script type="text/javascript" charset="utf-8">
            const timeText = document.getElementById("time");
            function formatDuration(ms) {
                const totalSeconds = Math.floor(ms / 1000);

                const hours = String(Math.floor(totalSeconds / 3600)).padStart(
                    2,
                    "0"
                );
                const minutes = String(
                    Math.floor((totalSeconds % 3600) / 60)
                ).padStart(2, "0");
                const seconds = String(totalSeconds % 60).padStart(2, "0");

                return `${hours}:${minutes}:${seconds}`;
            }

            // Exampl// "01:02:03"
            const target = new Date(2026, 4, 20, 0, 0, 0);
            function updateTime() {
                const now = new Date();
                timeLeft = target - now;
                timeText.textContent = formatDuration(timeLeft);
            }
            updateTime();
            setInterval(updateTime, 1000);
        </script>
    </body>
</html>
